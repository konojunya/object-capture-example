name: ObjectCapture
options:
  bundleIdPrefix: com.konojunya
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  ObjectCapture:
    type: application
    platform: iOS
    sources:
      - ObjectCapture/Sources
    settings:
      base:
        INFOPLIST_KEY_NSCameraUsageDescription: "3Dオブジェクトをスキャンするためにカメラを使用します"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: ""
